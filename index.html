<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoundationLearn — 三個月補底計劃</title>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

  <!-- App CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loader" class="loader">
    <div class="loader-ring"></div>
    <p id="loader-msg">載入中… / Loading…</p>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <!-- Navigation -->
  <nav id="nav">
    <div class="nav-brand">
      <span class="nav-logo">FL</span>
      <span class="nav-title">FoundationLearn</span>
    </div>
    <div class="nav-links">
      <button class="nav-btn" data-page="pg-dashboard" data-i18n="navDashboard">儀表板</button>
      <button class="nav-btn" data-page="pg-map"       data-i18n="navMap">課程地圖</button>
      <button class="nav-btn" data-page="pg-practice"  data-i18n="navPractice">練習</button>
      <button class="nav-btn" data-page="pg-progress"  data-i18n="navProgress">紀錄</button>
      <button class="nav-btn" data-page="pg-settings"  data-i18n="navSettings">設定</button>
    </div>
    <button id="lang-toggle" class="nav-btn lang-btn">EN</button>
  </nav>

  <!-- Main Pages -->
  <main id="main">

    <!-- Dashboard -->
    <section id="pg-dashboard" class="page"></section>

    <!-- Course Map -->
    <section id="pg-map" class="page"></section>

    <!-- Lesson View -->
    <section id="pg-lesson" class="page"></section>

    <!-- Practice -->
    <section id="pg-practice" class="page"></section>

    <!-- Progress / Records -->
    <section id="pg-progress" class="page"></section>

    <!-- Settings -->
    <section id="pg-settings" class="page"></section>

  </main>

  <!-- U28: Mobile bottom navigation -->
  <nav id="bottom-nav">
    <button class="bnav-btn" data-page="pg-dashboard" onclick="navigate('pg-dashboard')">
      <span class="bnav-icon">🏠</span><span>儀表板</span>
    </button>
    <button class="bnav-btn" data-page="pg-map" onclick="navigate('pg-map')">
      <span class="bnav-icon">🗺️</span><span>地圖</span>
    </button>
    <button class="bnav-btn" data-page="pg-practice" onclick="navigate('pg-practice')">
      <span class="bnav-icon">✏️</span><span>練習</span>
    </button>
    <button class="bnav-btn" data-page="pg-progress" onclick="navigate('pg-progress')">
      <span class="bnav-icon">📊</span><span>紀錄</span>
    </button>
    <button class="bnav-btn" data-page="pg-settings" onclick="navigate('pg-settings')">
      <span class="bnav-icon">⚙️</span><span>設定</span>
    </button>
  </nav>

  <!-- External Libraries (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <!-- Google Identity Services (Drive 同步用，async 載入不阻塞 App) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Debug Logger (必須在 app.js 之前載入，令 flog() 全域可用) -->
  <script src="debug.js"></script>

  <!-- Application -->
  <script src="app.js"></script>
</body>
</html>
